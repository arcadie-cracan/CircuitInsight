name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Qt runtime libs (PySide6 needs these headless on Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - name: Install
        # [gui] too, so the GUI/view tests actually run instead of skipping.
        # If PySide6 still cannot load, its importorskip guard skips those tests
        # rather than failing the job.
        run: python -m pip install -e .[dev,gui]
      - name: Run test suite (no EDA licenses needed — checked-in fixtures)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q
